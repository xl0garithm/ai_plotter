<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chess Plotter</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <main id="app">
      <header class="hero">
        <h1>Chess Plotter</h1>
        <p class="hero-subtitle">Play chess and drive the board with an XY plotter. Fully offline.</p>
      </header>

      <div class="layout-grid">
        <section class="panel">
          <div class="panel-header">
            <h2>Play</h2>
            <p class="muted">Human vs human, human vs computer, or computer vs computer.</p>
          </div>
          <div class="controls">
            <a href="/chess" class="button">Play Chess</a>
            <a href="/admin/" class="button secondary">Admin / Queue</a>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
