name: CI

on:
  push:
    branches: [main, master, chess_gtm]
  pull_request:
    branches: [main, master, chess_gtm]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements-dev.txt

      - name: Lint
        run: |
          . .venv/bin/activate
          make lint

      - name: Test
        run: |
          . .venv/bin/activate
          make test

  neo-chess-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Neo_Chess/package-lock.json

      - name: Install and typecheck
        working-directory: Neo_Chess
        run: |
          npm ci
          npm run check
